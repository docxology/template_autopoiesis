# Autopoietic Project Generation: Manuscript Configuration
# This file is the live source-of-truth for paper metadata and grammar spec.

paper:
  title: "Autopoietic Project Generation"
  subtitle: "A Combinatoric Grammar for Deterministic Runnable Project Synthesis"
  version: "1.0.1"
  date: "2026-07-06"
  cover:
    image: "figures/cover_art.png"

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

keywords:
  - "autopoiesis"
  - "combinatoric grammar"
  - "deterministic generation"
  - "project synthesis"
  - "reproducible research"
  - "infrastructure automation"

metadata:
  license: "MIT"
  # Denser page layout (see manuscript/preamble.md for the paired 9pt font
  # rescale). Forwarded to pandoc as `-V geometry:` by
  # infrastructure/rendering/_pdf_combined_pandoc.py::build_pandoc_tex_command.
  geometry: "a4paper,margin=0.25in"

# Explicit allowlist + order for Stage 02 analysis discovery
# (infrastructure/core/script_discovery.py::discover_analysis_scripts). Without
# this, discovery globs every scripts/*.py: it swept up autopoiesis.py (an
# argparse CLI entrypoint requiring a subcommand) and seal_child.py (a library
# helper requiring a <child_root> arg), and ran 04_seal.py before
# realize_child_full.py had materialized anything for it to seal — 3 of 9
# scripts failed. This list runs only real analysis steps, in dependency order.
analysis:
  scripts:
    - 02_measure_test_coverage.py
    - 01_generate_manuscript_assets.py
    - generate_cover_art.py
    - realize_archetypes.py
    - realize_child_full.py
    - 04_seal.py
    - z_generate_manuscript_variables.py

# ── Autopoiesis grammar ───────────────────────────────────────────────────────
# This block is parsed by src/grammar.py::load_grammar().
# seed: master integer seed for all deterministic selections.
# slots: each entry has name (str) and options (list[str]).
#   Reserved slots (figure_profile, qr_profile, integrity_profile) are excluded
#   from the effective product size.
# deps: list of vendorable infrastructure modules (see VENDORABLE_DEPS).
#
# Effective product size = 5 (primitive_domain) × 3 (track) × 3 (section_set) = 45
# Total product size = 5 × 3 × 3 × 2 × 2 × 2 = 360

autopoiesis:
  seed: 42
  slots:
    - name: primitive_domain
      options:
        - optimization
        - dynamics
        - statistics
        - signal
        - graph
    - name: track
      options:
        - analytical
        - empirical
        - hybrid
    - name: section_set
      options:
        - minimal
        - standard
        - extended
    - name: figure_profile
      options:
        - minimal
        - full
    - name: qr_profile
      options:
        - "off"
        - "on"
    - name: integrity_profile
      options:
        - sha256
        - merkle
  deps: []
publication:
  doi: "10.5281/zenodo.21227869"
  version_doi: "10.5281/zenodo.21229620"
  version_record: "https://zenodo.org/records/21229620"
  github_repository: "docxology/template_autopoiesis"
  published_artifacts:
    ipfs_pinata: "https://gateway.pinata.cloud/ipfs/QmanoQUGKKFeYFtd5HRpB4ysE9jVxbzvaWpqgpWu5rRi8V"
    osf: "https://osf.io/ksmzp/"
